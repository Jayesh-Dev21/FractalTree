name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config git \
          libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
          libgl1-mesa-dev libopenal-dev libasound2-dev libpulse-dev libudev-dev
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake pkg-config git raylib

      - name: Build raylib from source (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git raylib-src
          rm -rf raylib-src/build
          mkdir -p raylib-src/build
          cmake -S raylib-src -B raylib-src/build \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_SHARED_LIBS=ON \
          -DCMAKE_BUILD_TYPE=Release
          cmake --build raylib-src/build -j
          sudo cmake --install raylib-src/build

      - name: Build project
        run: |
          make

      - name: Verify binary produced
        run: |
          if [ -f bin/fractal_tree ]; then ls -l bin/fractal_tree; else echo "Binary not found"; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fractal_tree-${{ matrix.os }}
          path: bin/fractal_tree

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/fractal_tree*
